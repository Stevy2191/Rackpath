services:
  rackpath-db:
    image: mariadb:11
    container_name: rackpath-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - rackpath-db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rackpath-api:
    image: ${GHCR_NAMESPACE:-ghcr.io/stevy2191}/rackpath-api:${IMAGE_TAG:-latest}
    build:
      context: ./api
    container_name: rackpath-api
    restart: unless-stopped
    depends_on:
      rackpath-db:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT:-3010}
      DB_HOST: rackpath-db
      DB_PORT_INTERNAL: ${DB_PORT_INTERNAL:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SCANNER_URL: ${SCANNER_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      RACKPATH_JWT_SECRET: ${RACKPATH_JWT_SECRET}
    ports:
      - "${API_PORT:-3010}:${API_PORT:-3010}"
    volumes:
      - rackpath-uploads:/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rackpath-scanner:
    image: ${GHCR_NAMESPACE:-ghcr.io/stevy2191}/rackpath-scanner:${IMAGE_TAG:-latest}
    build:
      context: ./scanner
    container_name: rackpath-scanner
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      SCANNER_PORT: ${SCANNER_PORT:-5001}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}
      SCAN_INTERFACE: ${SCAN_INTERFACE}

  rackpath-frontend:
    image: ${GHCR_NAMESPACE:-ghcr.io/stevy2191}/rackpath-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
    container_name: rackpath-frontend
    restart: unless-stopped
    depends_on:
      - rackpath-api
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  rackpath-db-data:
  rackpath-uploads:
